name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Velg Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Installer xcodegen
        run: brew install xcodegen

      - name: Generer Xcode-prosjekt
        run: xcodegen generate

      - name: Bygg
        run: |
          xcodebuild build \
            -project Brainfit.xcodeproj \
            -scheme Brainfit \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty
        shell: bash

      - name: Kjør unit-tester
        run: |
          xcodebuild test \
            -project Brainfit.xcodeproj \
            -scheme Brainfit \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -only-testing:BrainfitTests \
            CODE_SIGNING_ALLOWED=NO | xcpretty
        shell: bash

      - name: Kjør UI-tester (advarsel kun)
        continue-on-error: true
        run: |
          xcodebuild test \
            -project Brainfit.xcodeproj \
            -scheme Brainfit \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -only-testing:BrainfitUITests \
            CODE_SIGNING_ALLOWED=NO | xcpretty
        shell: bash

  swiftlint:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Installer SwiftLint
        run: brew install swiftlint
      - name: Kjør SwiftLint
        run: swiftlint --strict --config .swiftlint.yml
