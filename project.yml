name: Brainfit
options:
  bundleIdPrefix: com.frodesolem
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: nb
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Brainfit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brainfit
        excludes:
          - "**/*.md"
    info:
      path: Brainfit/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Brainfit
        NSUserNotificationUsageDescription: Brainfit sender deg en daglig påminnelse om dagens trening.
    # CloudKit-entitlements er midlertidig fjernet — Personal Team (gratis Apple ID)
    # støtter ikke iCloud-containers. Reverter denne committen + ModelContainer-fallback
    # når Apple Developer Program ($99/år) er på plass.
    # entitlements:
    #   path: Brainfit/Brainfit.entitlements
    #   properties:
    #     com.apple.developer.icloud-container-identifiers:
    #       - iCloud.com.frodesolem.brainfit
    #     com.apple.developer.icloud-services:
    #       - CloudKit
    #     com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.frodesolem.brainfit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.frodesolem.brainfit
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  BrainfitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BrainfitTests
    dependencies:
      - target: Brainfit
    settings:
      base:
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Brainfit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Brainfit
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: "YES"

  BrainfitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BrainfitUITests
    dependencies:
      - target: Brainfit
    settings:
      base:
        TEST_TARGET_NAME: Brainfit
        GENERATE_INFOPLIST_FILE: "YES"

  BrainfitWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: BrainfitWatch
        excludes:
          - "**/*.md"
      # Gjenbruk delte filer fra iOS-targeten:
      - path: Brainfit/Core
      - path: Brainfit/Engine
      - path: Brainfit/Persistence
      - path: Brainfit/Games/NBack/NBackConfig.swift
      - path: Brainfit/Games/NBack/NBackScorer.swift
      - path: Brainfit/Games/NBack/NBackViewModel.swift
      - path: Brainfit/Games/TapTheColor/StroopConfig.swift
      - path: Brainfit/Games/TapTheColor/StroopScorer.swift
      - path: Brainfit/Games/TapTheColor/StroopViewModel.swift
      - path: Brainfit/Games/Hoderegning/HoderegningConfig.swift
      - path: Brainfit/Games/Hoderegning/HoderegningScorer.swift
      - path: Brainfit/Games/Hoderegning/HoderegningViewModel.swift
      - path: Brainfit/DesignSystem
    info:
      path: BrainfitWatch/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Brainfit
        WKApplication: true
        WKWatchOnly: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.frodesolem.brainfit.watchkitapp
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Brainfit:
    build:
      targets:
        Brainfit: all
        BrainfitTests: [test]
        BrainfitUITests: [test]
    test:
      targets:
        - BrainfitTests
        - BrainfitUITests
      gatherCoverageData: true
  BrainfitWatch:
    build:
      targets:
        BrainfitWatch: all
